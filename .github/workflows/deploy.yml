name: Full CI/CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-app
  ACCOUNT_ID: 961641296773

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 🔹 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 2. AWS Login using OIDC
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::961641296773:role/OIDC_Raj
          aws-region: ${{ env.AWS_REGION }}

      # 🏗️ 3. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ⚙️ 4. Terraform Init
      - name: Terraform Init
        working-directory: terraform-ecr
        run: terraform init

      # 📊 5. Terraform Apply
      - name: Terraform Apply
        working-directory: terraform-ecr
        run: |
          terraform apply -auto-approve \
            -var="region=${{ env.AWS_REGION }}" \
            -var="ecr_repo_name=${{ env.ECR_REPOSITORY }}"

      # 🐳 6. Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 🔨 7. Build Docker Image (ROOT folder)
      - name: Build Image
        run: docker build -t $ECR_REPOSITORY .

      # 🏷️ 8. Tag Image
      - name: Tag Image
        run: |
          docker tag $ECR_REPOSITORY:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.cm/$ECR_REPOSITORY:latest

      # 🚀 9. Push Image
      - name: Push Image
        run: |
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      # 🔥 10. Create ArgoCD Application (ADDED ONLY THIS)
      - name: Create ArgoCD Application
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: my-app
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: $REPO_URL
              targetRevision: HEAD
              path: .
            destination:
              server: https://kubernetes.default.svc
              namespace: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
          EOF
