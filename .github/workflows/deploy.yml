name: Full DevOps Pipeline (EKS + ArgoCD + Monitoring)

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: my-cluster
  DOCKER_IMAGE: username/my-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ AWS Login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-actions-role

      # 3️⃣ Connect to EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      # 4️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_IMAGE:${{ github.sha }} .

      # 5️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker tag $DOCKER_IMAGE:${{ github.sha }} $DOCKER_IMAGE:latest
          docker push $DOCKER_IMAGE:${{ github.sha }}
          docker push $DOCKER_IMAGE:latest

      # 6️⃣ Deploy Application
      - name: Deploy App to Kubernetes
        run: |
          kubectl apply -f k8s/app/

      # 7️⃣ Install Helm
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # 8️⃣ Install Metrics Server (Fix error)
      - name: Install Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

      # 9️⃣ Install ArgoCD
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd || true

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd

      # 🔟 Wait for ArgoCD (FIXED)
      - name: Wait for ArgoCD Pods
        run: |
          kubectl wait --for=condition=Ready pods --all -n argocd --timeout=600s

      # 1️⃣1️⃣ Install Prometheus + Grafana
      - name: Install Monitoring Stack
        run: |
          kubectl create namespace monitoring || true

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace monitoring

      # 1️⃣2️⃣ Wait for Monitoring
      - name: Wait for Monitoring Pods
        run: |
          kubectl wait --for=condition=Ready pods --all -n monitoring --timeout=600s

      # 1️⃣3️⃣ Apply ServiceMonitor
      - name: Apply ServiceMonitor
        run: |
          kubectl apply -f k8s/monitoring/service-monitor.yaml

      # 1️⃣4️⃣ Apply Grafana Ingress
      - name: Apply Grafana Ingress
        run: |
          kubectl apply -f k8s/monitoring/grafana-ingress.yaml

      # 1️⃣5️⃣ Debug (if fails)
      - name: Debug (if failure)
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -n argocd
          kubectl describe pods -n monitoring
