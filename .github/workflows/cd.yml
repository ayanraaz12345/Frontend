name: CD Pipeline (EKS + ArgoCD + Ingress + FIXED)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: my-cluster
  REPO_URL: https://github.com/ayanraaz12345/my-app-manifest.git

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ AWS Login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::961641296773:role/OIDC_Raj
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 4️⃣ Install Helm (NEW 🔥)
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # 5️⃣ Connect to EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      # 6️⃣ Install Metrics Server (Fix warning)
      - name: Install Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

      # 7️⃣ Install AWS Load Balancer Controller (CRDs only)
      - name: Install ALB Controller CRDs
        run: |
          kubectl apply -k "github.com/aws/eks-charts/stable/aws-load-balancer-controller//crds?ref=master"

      # 8️⃣ Install ArgoCD via Helm (FIXED 🔥)
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd || true

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd

      # 9️⃣ Wait for ALL ArgoCD Pods (FIXED 🔥)
      - name: Wait for ArgoCD
        run: |
          kubectl wait --for=condition=Ready pods --all -n argocd --timeout=600s

      # 🔟 Create ArgoCD App
      - name: Create ArgoCD App
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: my-app
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: $REPO_URL
              targetRevision: HEAD
              path: .
            destination:
              server: https://kubernetes.default.svc
              namespace: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
          EOF

      # 1️⃣1️⃣ Debug (if fail)
      - name: Debug
        if: failure()
        run: |
          kubectl get pods -n argocd
          kubectl describe pods -n argocd

      # 1️⃣2️⃣ Get Ingress URL
      - name: Get Ingress URL
        run: |
          kubectl get ingress
