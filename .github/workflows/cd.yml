name: CD Pipeline (EKS + ArgoCD + Live App)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ AWS Login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::961641296773:role/OIDC_Raj
          aws-region: us-east-1

      # 3️⃣ Install Tools
      - name: Install eksctl, kubectl, helm
        run: |
          curl -sL https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz | tar xz
          sudo mv eksctl /usr/local/bin

          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # 4️⃣ Check Cluster
      - name: Check Cluster
        id: check
        run: |
          if eksctl get cluster --region us-east-1 | grep -q my-cluster; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 5️⃣ Create Cluster (only if not exists)
      - name: Connect to Existing Cluster\
        run: |
          aws eks update-kubeconfig \
             --region us-east-1 \
             --name my-cluster

      # 6️⃣ Connect Cluster
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name my-cluster

      # 7️⃣ Verify Cluster
      - name: Verify Cluster
        run: |
          kubectl get nodes

      # 8️⃣ Install ArgoCD (Helm - stable)
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd || true

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd

      # 9️⃣ Wait for ArgoCD (FIXED)
      - name: Wait for ArgoCD
        run: |
          kubectl wait --for=condition=Ready pods --all -n argocd --timeout=600s

      # 🔟 Expose ArgoCD
      - name: Expose ArgoCD
        run: |
          kubectl patch svc argocd-server -n argocd \
          -p '{"spec": {"type": "LoadBalancer"}}'

      # 1️⃣1️⃣ Get ArgoCD Password
      - name: Get ArgoCD Password
        run: |
          kubectl get secret argocd-initial-admin-secret -n argocd \
          -o jsonpath="{.data.password}" | base64 --decode

      # 1️⃣2️⃣ Create ArgoCD App
      - name: Create App
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: my-app
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/ayanraaz12345/my-app-manifest.git
              targetRevision: HEAD
              path: .
            destination:
              server: https://kubernetes.default.svc
              namespace: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
          EOF

      # 1️⃣3️⃣ Expose App
      - name: Expose App
        run: |
          kubectl patch svc my-app-service \
          -p '{"spec": {"type": "LoadBalancer"}}' || true

      # 1️⃣4️⃣ Show URLs
      - name: Show URLs
        run: |
          echo "===== ArgoCD URL ====="
          kubectl get svc argocd-server -n argocd

          echo "===== App URL ====="
          kubectl get svc my-app-service || true

      # 1️⃣5️⃣ Debug (if failure)
      - name: Debug
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -n argocd
          kubectl describe pods -n default
