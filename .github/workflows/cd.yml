name: Full Pipeline (Smart Delete + Safe Create + ArgoCD)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  OLD_CLUSTER: my-cluster
  NEW_CLUSTER: my-new-cluster
  REPO_URL: https://github.com/ayanraaz12345/my-app-manifest.git

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ AWS Login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::961641296773:role/OIDC_Raj
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Install tools
      - name: Install kubectl, eksctl, helm
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          curl -sL https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz | tar xz
          sudo mv eksctl /usr/local/bin

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # 4️⃣ Check OLD cluster
      - name: Check Old Cluster
        id: oldcheck
        run: |
          if eksctl get cluster --region $AWS_REGION | grep -q $OLD_CLUSTER; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 5️⃣ Delete OLD cluster (only if exists)
      - name: Delete Old Cluster
        if: steps.oldcheck.outputs.exists == 'true'
        run: |
          eksctl delete cluster --name $OLD_CLUSTER --region $AWS_REGION

      # 6️⃣ Wait for deletion properly (IMPORTANT 🔥)
      - name: Wait for deletion complete
        if: steps.oldcheck.outputs.exists == 'true'
        run: |
          echo "Waiting for full cleanup..."
          sleep 300

      # 7️⃣ Check NEW cluster
      - name: Check New Cluster
        id: newcheck
        run: |
          if eksctl get cluster --region $AWS_REGION | grep -q $NEW_CLUSTER; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 8️⃣ Create NEW cluster (only if not exists)
      - name: Create New Cluster
        if: steps.newcheck.outputs.exists == 'false'
        run: |
          eksctl create cluster \
            --name $NEW_CLUSTER \
            --region $AWS_REGION \
            --nodes 2

      # 9️⃣ Connect to cluster
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $NEW_CLUSTER --region $AWS_REGION

      # 🔟 Verify cluster
      - name: Verify Cluster
        run: |
          kubectl get nodes

      # 1️⃣1️⃣ Install ArgoCD (Helm - stable)
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd || true

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd

      # 1️⃣2️⃣ Wait for ArgoCD
      - name: Wait for ArgoCD
        run: |
          kubectl wait --for=condition=Ready pods --all -n argocd --timeout=600s

      # 1️⃣3️⃣ Expose ArgoCD
      - name: Expose ArgoCD
        run: |
          kubectl patch svc argocd-server -n argocd \
          -p '{"spec": {"type": "LoadBalancer"}}'

      # 1️⃣4️⃣ Create ArgoCD App
      - name: Create ArgoCD App
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: my-app
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: $REPO_URL
              targetRevision: HEAD
              path: .
            destination:
              server: https://kubernetes.default.svc
              namespace: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
          EOF

      # 1️⃣5️⃣ Show URL
      - name: Show URL
        run: |
          kubectl get svc argocd-server -n argocd
