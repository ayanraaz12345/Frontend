name: CD Pipeline (EKS + ArgoCD + Live App)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: my-cluster
  ACCOUNT_ID: 961641296773
  REPO_URL: https://github.com/ayanraaz12345/my-app-manifest.git

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 AWS Login (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::961641296773:role/OIDC_Raj
          aws-region: ${{ env.AWS_REGION }}

      # 🧱 Install eksctl
      - name: Install eksctl
        run: |
          curl -sL https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz | tar xz
          sudo mv eksctl /usr/local/bin

      # 🔧 Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 🔍 Check if cluster exists
      - name: Check Cluster
        id: check
        run: |
          if eksctl get cluster --region $AWS_REGION | grep -q $CLUSTER_NAME; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 🚀 Create cluster if not exists
      - name: Create EKS Cluster
        if: steps.check.outputs.exists == 'false'
        run: |
          eksctl create cluster \
            --name $CLUSTER_NAME \
            --region $AWS_REGION \
            --nodes 2

      # 🔗 Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      # 🚀 Install ArgoCD (stable)
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd || true
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.9.3/manifests/install.yaml

      # ⏳ Wait for ArgoCD
      - name: Wait for ArgoCD
        run: |
          kubectl rollout status deployment argocd-server -n argocd --timeout=300s

      # 🌍 Expose ArgoCD UI
      - name: Expose ArgoCD
        run: |
          kubectl patch svc argocd-server -n argocd \
          -p '{"spec": {"type": "LoadBalancer"}}'

      # 🔧 Install ArgoCD CLI
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin

      # 🔑 Login ArgoCD
      - name: Get ArgoCD Password
        run: |
          PASSWORD=$(kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath="{.data.password}" | base64  --decode)
          echo "===== ARGOCD PASSWORD ====="
          echo $PASSWORD

      # 🔗 Create ArgoCD App
      - name: Create App
        run: |
          argocd app create my-app \
            --repo $REPO_URL \
            --path . \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace default || true

      # 🔄 Sync App
      - name: Sync App
        run: |
          argocd app sync my-app

      # 🌍 Expose Application
      - name: Expose App
        run: |
          kubectl patch svc my-app-service \
          -p '{"spec": {"type": "LoadBalancer"}} || true

      # 📡 Get URLs
      - name: Show URLs
        run: |
          echo "===== ArgoCD URL ====="
          kubectl get svc argocd-server -n argocd

          echo "===== App URL ====="
          kubectl get svc my-app-service
