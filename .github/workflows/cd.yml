name: Full Pipeline (Delete Old + Create New EKS + ArgoCD + Deploy)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  OLD_CLUSTER: my-cluster
  NEW_CLUSTER: my-new-cluster
  REPO_URL: https://github.com/ayanraaz12345/my-app-manifest.git

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ AWS Login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::961641296773:role/OIDC_Raj
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Install tools
      - name: Install kubectl & eksctl & helm
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # 4️⃣ Delete old cluster (SAFE)
      - name: Delete Old Cluster
        run: |
          eksctl delete cluster --name $OLD_CLUSTER --region $AWS_REGION || true

      # 5️⃣ Wait for deletion (IMPORTANT)
      - name: Wait for cleanup
        run: sleep 120

      # 6️⃣ Create NEW cluster
      - name: Create New Cluster
        run: |
          eksctl create cluster \
            --name $NEW_CLUSTER \
            --region $AWS_REGION \
            --nodes 2

      # 7️⃣ Connect to new cluster
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $NEW_CLUSTER --region $AWS_REGION

      # 8️⃣ Verify cluster
      - name: Verify Cluster
        run: |
          kubectl get nodes

      # 9️⃣ Install ArgoCD
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd || true

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd

      # 🔟 Wait for ArgoCD
      - name: Wait for ArgoCD
        run: |
          kubectl wait --for=condition=Ready pods --all -n argocd --timeout=600s

      # 1️⃣1️⃣ Expose ArgoCD
      - name: Expose ArgoCD
        run: |
          kubectl patch svc argocd-server -n argocd \
          -p '{"spec": {"type": "LoadBalancer"}}'

      # 1️⃣2️⃣ Create ArgoCD App
      - name: Create ArgoCD App
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: my-app
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: $REPO_URL
              targetRevision: HEAD
              path: .
            destination:
              server: https://kubernetes.default.svc
              namespace: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
          EOF

      # 1️⃣3️⃣ Show URLs
      - name: Show URLs
        run: |
          echo "===== ArgoCD URL ====="
          kubectl get svc argocd-server -n argocd
